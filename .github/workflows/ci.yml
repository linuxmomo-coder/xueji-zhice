name: CI

on:
  push:
    branches: [main, "feature/**", "release/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: xueji_ci
          POSTGRES_USER: xueji
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xueji -d xueji_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://xueji:ci-postgres-password@localhost:5432/xueji_ci
      SECRET_KEY: ci-secret-key-that-is-long-enough-for-tests
      ENABLE_DEMO: "false"
      AUTO_CREATE_SCHEMA: "false"
      SEED_DEMO_DATA: "false"
      FILE_STORAGE_PATH: /tmp/xueji-ci-uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: ruff check app tests migrations
      - run: bandit -q -r app -x tests -s B105,B106
      - run: alembic upgrade head
      - run: alembic current
      - run: pytest --cov=app --cov-report=term-missing --cov-fail-under=60

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm config set registry https://registry.npmjs.org/
      - run: npm install --no-audit --no-fund --ignore-scripts
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose --env-file .env -f deployment/docker-compose.yml config
      - run: docker build -t xueji-zhice-backend ./backend
      - run: docker build -t xueji-zhice-frontend ./frontend
