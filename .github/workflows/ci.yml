name: CI

on:
  push:
    branches: [main, "feature/**", "release/**"]
  pull_request:
    branches: [main]

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: pip install -q -r requirements-dev.txt
      - name: Run Ruff
        shell: bash
        run: |
          set +e
          ruff check app tests migrations > ruff.log 2>&1
          code=$?
          cat ruff.log
          exit $code
      - name: Upload Ruff log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-log
          path: backend/ruff.log
          if-no-files-found: error
          retention-days: 7
      - run: bandit -q -r app -x tests -s B105,B106
      - name: Run backend tests
        shell: bash
        run: |
          set +e
          pytest -q --tb=short --cov=app --cov-report=term-missing --cov-fail-under=65 > pytest.log 2>&1
          code=$?
          cat pytest.log
          exit $code
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: backend/pytest.log
          if-no-files-found: warn
          retention-days: 7

  backend-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: xueji_ci
          POSTGRES_USER: xueji_ci
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xueji_ci -d xueji_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://xueji_ci:ci-postgres-password@127.0.0.1:5432/xueji_ci
      POSTGRES_PASSWORD: ci-postgres-password
      SECRET_KEY: ci-secret-key-that-is-long-enough-for-tests
      ENABLE_DEMO: "false"
      AUTO_CREATE_SCHEMA: "false"
      SEED_DEMO_DATA: "false"
      ENABLE_API_DOCS: "false"
      STORAGE_PROVIDER: local
      FILE_STORAGE_PATH: /tmp/xueji-ci-uploads
      OCR_ENABLED: "false"
      OCR_PROVIDER: disabled
      AI_ENABLED: "false"
      AI_PRIMARY_PROVIDER: disabled
      AI_FALLBACK_PROVIDER: disabled
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -q -r requirements.txt
      - run: alembic upgrade head
      - name: Verify production schema
        run: |
          python - <<'PY'
          from sqlalchemy import create_engine, inspect
          from app.core.config import settings

          inspector = inspect(create_engine(settings.database_url))
          names = set(inspector.get_table_names())
          required = {
              "users", "account_tokens", "guardian_consents", "question_import_batches",
              "question_import_rows", "question_reviews", "question_sources", "ocr_jobs",
              "ai_reports", "question_answer_rules", "question_error_reports",
              "question_correction_reviews", "answer_regrade_jobs", "question_taxonomy_nodes",
              "question_taxonomy_mappings", "student_error_profiles", "question_relations",
              "recommendation_events", "user_notifications", "audit_events",
          }
          missing = required - names
          assert not missing, f"missing tables: {sorted(missing)}"
          ai_columns = {column["name"] for column in inspector.get_columns("ai_reports")}
          assert {"evidence_snapshot", "usage_json", "generation_key", "prompt_version"} <= ai_columns
          PY
      - run: python -c "import app.regrade_worker, app.ai_worker, app.worker"
      - run: alembic downgrade base
      - run: alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm config set registry https://registry.npmjs.org/
      - run: npm install --no-audit --no-fund --ignore-scripts
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose --env-file .env -f deployment/docker-compose.yml config
      - run: docker build -t xueji-zhice-backend ./backend
      - run: docker build -t xueji-zhice-frontend ./frontend
