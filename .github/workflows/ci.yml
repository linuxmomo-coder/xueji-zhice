name: CI

on:
  push:
    branches: [main, "feature/**", "release/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./ci.db
      SECRET_KEY: ci-secret-key-that-is-long-enough-for-tests
      ENABLE_DEMO: "false"
      AUTO_CREATE_SCHEMA: "false"
      SEED_DEMO_DATA: "false"
      FILE_STORAGE_PATH: /tmp/xueji-ci-uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: ruff check app tests migrations
      - run: bandit -q -r app -x tests -s B105,B106
      - run: alembic upgrade head
      - run: alembic downgrade base
      - run: pytest --cov=app --cov-report=term-missing --cov-fail-under=60

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose -f deployment/docker-compose.yml config
      - run: docker build -t xueji-zhice-backend ./backend
      - run: docker build -t xueji-zhice-frontend ./frontend
