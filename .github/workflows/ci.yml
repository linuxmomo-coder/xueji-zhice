name: CI

on:
  push:
    branches: [main, "feature/**", "release/**"]
  pull_request:
    branches: [main]

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: pip install -q -r requirements-dev.txt
      - run: ruff check app tests migrations
      - run: bandit -q -r app -x tests -s B105,B106
      - run: pytest -q --tb=short --cov=app --cov-report=term-missing --cov-fail-under=65

  backend-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: xueji_ci
          POSTGRES_USER: xueji_ci
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xueji_ci -d xueji_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://xueji_ci:ci-postgres-password@127.0.0.1:5432/xueji_ci
      POSTGRES_PASSWORD: ci-postgres-password
      SECRET_KEY: ci-secret-key-that-is-long-enough-for-tests
      ENABLE_DEMO: "false"
      AUTO_CREATE_SCHEMA: "false"
      SEED_DEMO_DATA: "false"
      ENABLE_API_DOCS: "false"
      STORAGE_PROVIDER: local
      FILE_STORAGE_PATH: /tmp/xueji-ci-uploads
      OCR_ENABLED: "false"
      AI_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -q -r requirements.txt
      - run: alembic upgrade head
      - run: python -c "from sqlalchemy import create_engine, inspect; from app.core.config import settings; names=inspect(create_engine(settings.database_url)).get_table_names(); assert 'users' in names and 'question_answer_rules' in names and 'audit_events' in names, names"
      - run: alembic downgrade base
      - run: alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm config set registry https://registry.npmjs.org/
      - run: npm install --no-audit --no-fund --ignore-scripts
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose --env-file .env -f deployment/docker-compose.yml config
      - run: docker build -t xueji-zhice-backend ./backend
      - run: docker build -t xueji-zhice-frontend ./frontend
