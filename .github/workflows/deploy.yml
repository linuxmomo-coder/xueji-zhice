name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            cd "${DEPLOY_PATH:-/opt/xueji-zhice}"
            test -f .env
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            docker compose -f deployment/docker-compose.yml up -d --build --remove-orphans
            docker compose -f deployment/docker-compose.yml ps
            curl --fail --retry 10 --retry-delay 3 http://127.0.0.1/health
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/xueji-zhice' }}
