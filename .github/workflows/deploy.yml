name: Deploy production

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Backend tests
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pytest -q
      - name: Frontend build
        working-directory: frontend
        run: |
          npm install
          npm run build
      - name: Docker configuration and build
        run: |
          cp .env.example .env
          docker compose -f deployment/docker-compose.yml config
          docker build -t xueji-zhice-backend ./backend
          docker build -t xueji-zhice-frontend ./frontend

  deploy:
    needs: preflight
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            test -f .env
            docker compose -f deployment/docker-compose.yml config >/dev/null
            docker compose -f deployment/docker-compose.yml up -d --build --remove-orphans
            for i in $(seq 1 30); do
              if curl --fail --silent http://127.0.0.1/health >/dev/null; then
                echo "deployment healthy"
                exit 0
              fi
              sleep 5
            done
            docker compose -f deployment/docker-compose.yml ps
            exit 1
