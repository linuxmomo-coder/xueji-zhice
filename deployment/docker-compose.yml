services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    mem_limit: 1g
    logging:
      options: {max-size: "10m", max-file: "5"}
    networks: [internal]

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    mem_limit: 256m
    logging:
      options: {max-size: "10m", max-file: "5"}
    networks: [internal]

  backend:
    build:
      context: ../backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      FILE_STORAGE_PATH: /data/uploads
    volumes:
      - upload_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.5
    logging:
      options: {max-size: "20m", max-file: "5"}
    networks: [internal]

  ocr-worker:
    build:
      context: ../backend
    command: ["python", "-m", "app.worker"]
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      FILE_STORAGE_PATH: /data/uploads
    volumes:
      - upload_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    logging:
      options: {max-size: "20m", max-file: "5"}
    networks: [internal]

  ai-worker:
    build:
      context: ../backend
    command: ["python", "-m", "app.ai_worker"]
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    logging:
      options: {max-size: "20m", max-file: "5"}
    networks: [internal]

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    mem_limit: 128m
    logging:
      options: {max-size: "10m", max-file: "3"}
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    mem_limit: 128m
    logging:
      options: {max-size: "10m", max-file: "5"}
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  upload_data:
